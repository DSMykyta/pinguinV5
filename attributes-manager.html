<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Управління атрибутами</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body style="display: flex; min-height: 100vh; margin: 0;">

    <aside class="layout-aside" style="width: 300px; padding: 24px; border-right: 1px solid var(--color-border, #333);">
        <h2>Фільтри</h2>
        
        <div class="form-group" style="margin-top: 24px;">
            <label class="block-line-label">Тип атрибуту (type)</label>
            <select id="filterType" class="input-box" onchange="applyFilters()" style="width: 100%; margin-top: 8px;">
                <option value="all">Всі типи</option>
                </select>
        </div>

        <div class="form-group" style="margin-top: 16px;">
            <label class="block-line-label">Тип фільтра (filter_type)</label>
            <select id="filterCategory" class="input-box" onchange="applyFilters()" style="width: 100%; margin-top: 8px;">
                <option value="all">Всі фільтри</option>
                </select>
        </div>

        <div class="form-group" style="margin-top: 16px;">
            <label class="block-line-label">Глобальний (is_global)</label>
            <select id="filterGlobal" class="input-box" onchange="applyFilters()" style="width: 100%; margin-top: 8px;">
                <option value="all">Всі</option>
                <option value="TRUE">TRUE</option>
                <option value="FALSE">FALSE</option>
            </select>
        </div>
    </aside>

    <main class="layout-main" style="flex: 1; padding: 24px; overflow-y: auto;">
        
        <header class="toolbar" style="margin-bottom: 24px;">
            <div class="search-box" style="max-width: 600px;">
                <input type="text" id="searchInput" class="input-box" placeholder="Пошук за назвою або ID..." onkeyup="applyFilters()" style="width: 100%;">
            </div>
        </header>

        <div class="block-group grid" id="mainGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px;">
            </div>

    </main>

    <dialog id="folderModal" style="width: 80%; max-width: 1200px; padding: 24px; border-radius: 8px; border: 1px solid var(--color-border, #333); background: var(--color-surface, #1e1e1e); color: inherit;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2 id="modalTitle">Назва папки</h2>
            <button class="btn-icon" onclick="document.getElementById('folderModal').close()">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="block-group grid" id="modalGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px;">
            </div>
    </dialog>

<script>
    let state = {
        items: {},
        draggedId: null,
        visibleIds: new Set() 
    };

    // 1. Асинхронне завантаження твоїх 13903 рядків
    async function init() {
        try {
            // ВКАЖИ ТУТ СВОЮ НАЗВУ АРКУША ТА ДІАПАЗОН (наприклад Attributes!A2:Z15000)
            const apiUrl = '/api/public/data?sheet=ТВІЙ_АРКУШ&range=A2:Z15000'; 
            
            // Показуємо індикатор завантаження
            document.getElementById('mainGrid').innerHTML = '<h3 style="padding: 24px;">Завантаження 13000+ атрибутів...</h3>';

            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error('Помилка сервера');
            
            const result = await response.json();
            const rows = result.data; // Твій масив масивів з Google Sheets

            const types = new Set();
            const filterTypes = new Set();

            // 2. Парсимо всі 13к рядків у фоні (це швидко)
            rows.forEach(row => {
                const rowId = row[0]; // id
                const jsonStr = row[4]; // 5 колонка: data

                if (jsonStr) {
                    try {
                        const data = typeof jsonStr === 'string' ? JSON.parse(jsonStr) : jsonStr;
                        state.items[rowId] = {
                            id: rowId,
                            type: 'card',
                            parentId: null,
                            data: data
                        };
                        
                        if(data.type) types.add(data.type);
                        if(data.filter_type) filterTypes.add(data.filter_type);
                    } catch(e) {
                        // Ігноруємо рядки з битим JSON
                    }
                }
            });

            // Заповнюємо фільтри
            populateSelect('filterType', types);
            populateSelect('filterCategory', filterTypes);

            // Викликаємо первинну фільтрацію і рендер
            applyFilters(); 

        } catch (error) {
            console.error(error);
            document.getElementById('mainGrid').innerHTML = `<h3 style="color: red; padding: 24px;">Помилка: ${error.message}</h3>`;
        }
    }

    function populateSelect(selectId, optionsSet) {
        const select = document.getElementById(selectId);
        optionsSet.forEach(opt => {
            if(opt && opt !== "null") {
                const el = document.createElement('option');
                el.value = opt;
                el.innerText = opt;
                select.appendChild(el);
            }
        });
    }

    // 3. Логіка фільтрації
    function applyFilters() {
        const searchQuery = document.getElementById('searchInput').value.toLowerCase();
        const typeFilter = document.getElementById('filterType').value;
        const filterCategory = document.getElementById('filterCategory').value;
        const globalFilter = document.getElementById('filterGlobal').value;

        state.visibleIds.clear();

        Object.values(state.items).forEach(item => {
            if (item.type === 'folder') {
                state.visibleIds.add(item.id);
                return;
            }

            const d = item.data;
            // Безпечна перевірка полів, бо в 13к рядках може бути що завгодно
            const name = d.name ? d.name.toLowerCase() : '';
            const idStr = d.id ? d.id.toString() : '';
            
            const matchSearch = name.includes(searchQuery) || idStr.includes(searchQuery);
            const matchType = typeFilter === 'all' || d.type === typeFilter;
            const matchCategory = filterCategory === 'all' || d.filter_type === filterCategory;
            const matchGlobal = globalFilter === 'all' || d.is_global === globalFilter;

            if (matchSearch && matchType && matchCategory && matchGlobal) {
                state.visibleIds.add(item.id);
            }
        });

        render();
    }

    // 4. Рендер З ОБМЕЖЕННЯМ КІЛЬКОСТІ (щоб не завис браузер)
    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';

        // Беремо всі елементи, які пройшли фільтр і не лежать в папках
        const itemsToRender = Object.values(state.items)
            .filter(item => item.parentId === null && state.visibleIds.has(item.id));

        // ЛІМІТ: Рендеримо тільки перші 100 результатів!
        const RENDER_LIMIT = 100;
        const slicedItems = itemsToRender.slice(0, RENDER_LIMIT);

        slicedItems.forEach(item => {
            grid.appendChild(createDomElement(item));
        });

        // Показуємо повідомлення, якщо є ще приховані картки
        if (itemsToRender.length > RENDER_LIMIT) {
            const msg = document.createElement('div');
            msg.style.gridColumn = "1 / -1";
            msg.style.padding = "20px";
            msg.style.textAlign = "center";
            msg.style.color = "var(--color-text-dim)";
            msg.innerHTML = `Показано ${RENDER_LIMIT} з ${itemsToRender.length} результатів. Використовуйте пошук та фільтри, щоб знайти інші.`;
            grid.appendChild(msg);
        }
    }

    // 5. Формування HTML елемента
    function createDomElement(item) {
        const block = document.createElement('div');
        block.className = 'block';
        block.dataset.rowId = item.id;
        block.draggable = true;
        block.style.cursor = 'grab';

        // Drag & Drop
        block.ondragstart = (e) => {
            state.draggedId = item.id;
            e.dataTransfer.setData('text/plain', item.id);
            block.style.opacity = '0.5';
        };
        block.ondragend = () => {
            state.draggedId = null;
            block.style.opacity = '1';
            document.querySelectorAll('.block').forEach(b => b.style.outline = 'none');
        };
        block.ondragover = (e) => {
            e.preventDefault();
            if (state.draggedId !== item.id) block.style.outline = '2px dashed var(--color-primary, #007bff)';
        };
        block.ondragleave = () => block.style.outline = 'none';
        block.ondrop = (e) => {
            e.preventDefault();
            block.style.outline = 'none';
            handleMerge(e.dataTransfer.getData('text/plain'), item.id);
        };

        if (item.type === 'card') {
            const d = item.data;
            block.innerHTML = `
                <div class="block-header">
                    <h3>${d.name || 'Без назви'}</h3>
                    <div class="group">
                        <button class="btn-icon" title="Тип: ${d.type}"><span class="material-symbols-outlined">info</span></button>
                    </div>
                </div>
                <div class="block-list">
                    <div class="block-line">
                        <label class="block-line-label">id</label>
                        <span class="block-line-text">${d.id || '-'}</span>
                    </div>
                    <div class="block-line">
                        <label class="block-line-label">type</label>
                        <span class="block-line-text">${d.type || '-'}</span>
                    </div>
                    <div class="block-line">
                        <label class="block-line-label">filter_type</label>
                        <span class="block-line-text">${d.filter_type || '-'}</span>
                    </div>
                    <div class="block-line">
                        <label class="block-line-label">is_global</label>
                        <span class="block-line-text">${d.is_global || '-'}</span>
                    </div>
                    <div class="block-line">
                        <label class="block-line-label">category</label>
                        <span class="block-line-text" title="${d.category_name}">${(d.category_name || '').split(',')[0]}...</span>
                    </div>
                </div>
            `;
        } else if (item.type === 'folder') {
            const childrenCount = Object.values(state.items).filter(i => i.parentId === item.id).length;
            block.innerHTML = `
                <div class="block-header" style="background: var(--color-surface-2, rgba(255,255,255,0.05));">
                    <input type="text" class="input-box" value="${item.name}" 
                           style="background: transparent; border: none; font-weight: bold; font-size: 16px; width: 100%;"
                           onchange="renameFolder('${item.id}', this.value)" 
                           onclick="event.stopPropagation()">
                </div>
                <div class="block-list">
                    <div class="block-line">
                        <label class="block-line-label">Вкладених атрибутів</label>
                        <span class="block-line-text">${childrenCount} шт.</span>
                    </div>
                    <div class="block-line" style="justify-content: center; margin-top: 16px;">
                        <span class="block-line-text" style="color: var(--color-text-dim); cursor: pointer;">Клікніть щоб розкрити</span>
                    </div>
                </div>
            `;
            block.onclick = () => openFolder(item.id);
        }

        return block;
    }

    function handleMerge(sourceId, targetId) {
        if (sourceId === targetId) return;

        const source = state.items[sourceId];
        const target = state.items[targetId];

        if (target.type === 'card') {
            const newFolderId = 'folder-' + Date.now();
            state.items[newFolderId] = {
                id: newFolderId,
                type: 'folder',
                name: 'Нова група атрибутів',
                parentId: null
            };
            state.visibleIds.add(newFolderId); 
            
            source.parentId = newFolderId;
            target.parentId = newFolderId;
        } else {
            source.parentId = targetId;
        }
        render();
    }

    function renameFolder(id, newName) {
        state.items[id].name = newName;
    }

    function openFolder(folderId) {
        const folder = state.items[folderId];
        document.getElementById('modalTitle').innerText = folder.name;
        
        const modalGrid = document.getElementById('modalGrid');
        modalGrid.innerHTML = '';

        Object.values(state.items)
            .filter(item => item.parentId === folderId)
            .forEach(item => {
                const el = createDomElement(item);
                el.draggable = false; 
                el.style.cursor = 'default';
                modalGrid.appendChild(el);
            });

        document.getElementById('folderModal').showModal();
    }

    // Запускаємо завантаження при старті
    init();
</script>
</body>
</html>
