<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маппер атрибутів</title>
    <link rel="icon" type="image/png" href="icon/dy_Dark_Pinguin.png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="js/theme-init.js"></script>
</head>

<body>
    <div class="nav column" id="main-nav"></div>

    <!-- ЦЕНТРАЛЬНИЙ БЛОК -->
    <main id="content-main" class="content-main tabbed-page">

        <!-- НАВІГАТОР ТАБІВ -->
        <nav class="nav row" role="group" aria-label="Таби" data-tabs-container id="section-navigator">
            <button class="btn-icon expand active" aria-label="Категорії" data-tab-target="tab-am-categories">
                <span class="material-symbols-outlined">square</span>
                <span class="btn-icon-label">Категорії</span>
            </button>

            <button class="btn-icon expand" aria-label="Характеристики" data-tab-target="tab-am-characteristics">
                <span class="material-symbols-outlined">change_history</span>
                <span class="btn-icon-label">Характеристики</span>
            </button>

            <button class="btn-icon expand" aria-label="Опції" data-tab-target="tab-am-options">
                <span class="material-symbols-outlined">circle</span>
                <span class="btn-icon-label">Опції</span>
            </button>

            <a href="entities.html" class="btn-icon expand" aria-label="Сутності">
                <span class="material-symbols-outlined">arrow_back</span>
                <span class="btn-icon-label">Сутності</span>
            </a>
        </nav>

        <!-- TAB: КАТЕГОРІЇ -->
        <div class="tab-content active" data-tab-content="tab-am-categories" id="tab-am-categories">

            <div class="section-header">
                <div class="section-name-block">
                    <div class="section-name">
                        <h2 class="display-l section-upper">Категорії</h2>
                    </div>
                </div>

                <div class="group">
                    <div class="input-box">
                        <span class="material-symbols-outlined">search</span>
                        <input type="text" class="am-search-input" placeholder="Пошук...">
                    </div>
                </div>
            </div>

            <div id="am-categories-grid" class="block-group grid">
            </div>
        </div>

        <!-- TAB: ХАРАКТЕРИСТИКИ -->
        <div class="tab-content" data-tab-content="tab-am-characteristics" id="tab-am-characteristics">

            <div class="section-header">
                <div class="section-name-block">
                    <div class="section-name">
                        <h2 class="display-l section-upper">Характеристики</h2>
                    </div>
                </div>

                <div class="group">
                    <div class="input-box">
                        <span class="material-symbols-outlined">search</span>
                        <input type="text" class="am-search-input" placeholder="Пошук...">
                    </div>
                </div>
            </div>

            <div id="am-characteristics-grid" class="block-group grid">
            </div>
        </div>

        <!-- TAB: ОПЦІЇ -->
        <div class="tab-content" data-tab-content="tab-am-options" id="tab-am-options">

            <div class="section-header">
                <div class="section-name-block">
                    <div class="section-name">
                        <h2 class="display-l section-upper">Опції</h2>
                    </div>
                </div>

                <div class="group">
                    <div class="input-box">
                        <span class="material-symbols-outlined">search</span>
                        <input type="text" class="am-search-input" placeholder="Пошук...">
                    </div>
                </div>
            </div>

            <div id="am-options-grid" class="block-group grid">
            </div>
        </div>

        <!-- ФІКСОВАНИЙ ФУТЕР -->
        <footer class="footer"></footer>

    </main>

    <!-- CONTROLS -->
    <div class="aside-controls">
        <button class="btn-icon large rotate aside-trigger" aria-label="Toggle aside">
            <span class="material-symbols-outlined">apps</span>
        </button>
    </div>

    <!-- ASIDE -->
    <aside class="aside closed">
        <div class="aside-body"></div>
    </aside>

    <!-- FAB -->
    <div class="aside-fab"></div>

    <div id="modal-placeholder"></div>

    <script type="module" src="js/main-attributes-manager.js"></script>
</body>

</html>
