<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ШІ</title>
    <link rel="icon" type="image/png" href="icon/dy_Dark_Pinguin.png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="js/theme-init.js"></script>
</head>

<body class="layout-v2 aside-unavailable">
    <div class="nav column" id="main-nav"></div>

    <main id="content-main" class="content-main tabbed-page">
        <nav class="nav row" role="group" aria-label="Таби" data-tabs-container id="section-navigator">
            <button type="button" class="btn-icon expand active" data-tab-target="tab-ai">
                <span class="material-symbols-outlined">auto_awesome</span>
                <span class="btn-icon-label">ШІ</span>
            </button>
        </nav>

        <div class="tab-content active" data-tab-content="tab-ai" id="tab-ai">
            <div class="section-header">
                <div class="section-name-block">
                    <div class="section-name">
                        <h2 class="display-l section-upper">ШІ</h2>
                        <button class="btn-icon" aria-label="Інформація">
                            <span class="material-symbols-outlined">info</span>
                        </button>
                    </div>
                    <p class="body-s">Назва, посилання або текст джерела -> окремі поля для копіювання.</p>
                </div>
            </div>

            <div id="ai-magic-surface" class="ai-magic-surface">
                <div class="content-bloc-container">
                    <div class="content-bloc">
                        <div class="group">
                            <div id="ai-magic-avatar-container"></div>
                            <div class="speech-bubble body-s" id="ai-magic-avatar-message">Давай зроблю магію.</div>
                        </div>

                        <div class="group column">
                            <label class="label-s" for="ai-magic-source">Назва, iHerb або офіційне посилання</label>
                            <input type="text" id="ai-magic-source" class="input-main"
                                placeholder="iHerb, офіційний сайт або назва товару">
                            <button class="btn-primary" id="ai-magic-generate-btn">Заповнити</button>
                            <span class="body-s">Якщо сайт повертає 403, встав нижче HTML або текст сторінки. Без прочитаних фактів склад і порція не вигадуються.</span>
                        </div>

                        <div class="grid">
                            <div class="group column col-6">
                                <label for="ai-magic-source-text">Текст або HTML джерела, якщо сайт не читається</label>
                                <textarea id="ai-magic-source-text" class="input-main ai-magic-textarea" rows="6"
                                    placeholder="Опційно: встав текст сторінки, склад, інструкцію або HTML"></textarea>
                            </div>

                            <div class="group column col-6">
                                <label for="ai-magic-rules">Правила для текстів і таблиць</label>
                                <textarea id="ai-magic-rules" class="input-main ai-magic-textarea" rows="6"
                                    placeholder="Опційно: додаткові правила, які треба врахувати"></textarea>
                            </div>
                        </div>

                        <span class="body-s" id="ai-magic-status"></span>
                        <div id="ai-magic-loader"></div>
                    </div>
                </div>

                <div class="ai-magic-result u-hidden" id="ai-magic-result">
                    <div class="content-bloc-container">
                        <div class="content-bloc">
                            <div class="group column">
                                <h3 class="display-s">SEO UA</h3>
                                <label class="label-s" for="ai-magic-h1-ua">H1 / текст перед назвою</label>
                                <input type="text" id="ai-magic-h1-ua" class="input-main" placeholder="H1 UA">
                                <label class="label-s" for="ai-magic-seo-title-ua">SEO Title</label>
                                <input type="text" id="ai-magic-seo-title-ua" class="input-main" placeholder="SEO Title UA">
                                <label class="label-s" for="ai-magic-seo-description-ua">SEO Description</label>
                                <textarea id="ai-magic-seo-description-ua" class="input-main" rows="3"
                                    placeholder="SEO Description UA"></textarea>
                                <label class="label-s" for="ai-magic-seo-keywords-ua">SEO Keywords</label>
                                <input type="text" id="ai-magic-seo-keywords-ua" class="input-main" placeholder="SEO Keywords UA">
                            </div>
                        </div>

                        <div class="content-bloc">
                            <div class="group column">
                                <h3 class="display-s">SEO RU</h3>
                                <label class="label-s" for="ai-magic-h1-ru">H1 / текст перед названием</label>
                                <input type="text" id="ai-magic-h1-ru" class="input-main" placeholder="H1 RU">
                                <label class="label-s" for="ai-magic-seo-title-ru">SEO Title</label>
                                <input type="text" id="ai-magic-seo-title-ru" class="input-main" placeholder="SEO Title RU">
                                <label class="label-s" for="ai-magic-seo-description-ru">SEO Description</label>
                                <textarea id="ai-magic-seo-description-ru" class="input-main" rows="3"
                                    placeholder="SEO Description RU"></textarea>
                                <label class="label-s" for="ai-magic-seo-keywords-ru">SEO Keywords</label>
                                <input type="text" id="ai-magic-seo-keywords-ru" class="input-main" placeholder="SEO Keywords RU">
                            </div>
                        </div>
                    </div>

                    <div class="content-bloc-container">
                        <div class="content-bloc">
                            <div class="group column">
                                <h3 class="display-s">Текст UA</h3>
                                <div id="ai-magic-description-ua-editor" class="section-content-full-height" editor
                                    tools code check stats cleanup-links cleanup-styles cleanup-images
                                    data-placeholder="Опис українською..." data-min-height="320" data-tag="UA">
                                </div>
                            </div>
                        </div>

                        <div class="content-bloc">
                            <div class="group column">
                                <h3 class="display-s">Текст RU</h3>
                                <div id="ai-magic-description-ru-editor" class="section-content-full-height" editor
                                    tools code check stats cleanup-links cleanup-styles cleanup-images
                                    data-placeholder="Опис російською..." data-min-height="320" data-tag="RU">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="content-bloc-container">
                        <div class="content-bloc">
                            <div class="group column">
                                <h3 class="display-s">Склад UA</h3>
                                <label class="label-s">Код складу для товару</label>
                                <div id="ai-magic-composition-code-ua-editor" class="section-content-full-height" editor
                                    tools code data-placeholder="HTML-код складу українською..." data-min-height="220"
                                    data-tag="UA">
                                </div>
                                <label class="label-s">Вміст 1 порції</label>
                                <div id="ai-magic-serving-notes-ua-editor" class="section-content-full-height" editor
                                    tools code br data-placeholder="1 порція українською..." data-min-height="160"
                                    data-tag="UA">
                                </div>
                                <label class="label-s">Текст для генератора таблиць</label>
                                <textarea id="ai-magic-table-ua" class="input-main ai-magic-textarea" rows="8"></textarea>
                            </div>
                        </div>

                        <div class="content-bloc">
                            <div class="group column">
                                <h3 class="display-s">Состав RU</h3>
                                <label class="label-s">Код состава для товара</label>
                                <div id="ai-magic-composition-code-ru-editor" class="section-content-full-height" editor
                                    tools code data-placeholder="HTML-код состава на русском..." data-min-height="220"
                                    data-tag="RU">
                                </div>
                                <label class="label-s">Содержание 1 порции</label>
                                <div id="ai-magic-serving-notes-ru-editor" class="section-content-full-height" editor
                                    tools code br data-placeholder="1 порция на русском..." data-min-height="160"
                                    data-tag="RU">
                                </div>
                                <label class="label-s">Текст для генератора таблиц</label>
                                <textarea id="ai-magic-table-ru" class="input-main ai-magic-textarea" rows="8"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="content-bloc-container">
                        <div class="content-bloc">
                            <div class="group column">
                                <h3 class="display-s">Фото</h3>
                                <textarea id="ai-magic-images" class="input-main ai-magic-textarea" rows="5"
                                    placeholder="URL зображень, по одному в рядку"></textarea>
                            </div>
                        </div>

                        <div class="content-bloc">
                            <div class="group column">
                                <h3 class="display-s">Нотатки для перевірки</h3>
                                <div class="content-bloc ai-magic-notes" id="ai-magic-notes"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="footer"></footer>
    </main>

    <div class="aside-controls">
        <button class="btn-icon medium square rotate aside-trigger" aria-label="Toggle aside">
            <span class="material-symbols-outlined">apps</span>
        </button>
    </div>

    <aside class="aside closed">
        <div class="aside-body"></div>
    </aside>

    <div class="aside-fab"></div>
    <div id="modal-placeholder"></div>

    <script type="module" src="js/main-ai.js"></script>
</body>

</html>
