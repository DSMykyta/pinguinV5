<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог</title>
    <link rel="icon" type="image/png" href="icon/dy_Dark_Pinguin.png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="js/theme-init.js"></script>
</head>

<body>
    <div class="nav column" id="main-nav"></div>

    <main id="content-main" class="content-main tabbed-page" data-aside-template="aside-blog">
        <nav class="nav row" role="group" aria-label="Таби" data-tabs-container id="section-navigator">
            <button class="btn-icon expand active" aria-label="Новини" data-tab-target="tab-news">
                <span class="material-symbols-outlined">newspaper</span>
                Новини
            </button>
            <button class="btn-icon expand" aria-label="Блог" data-tab-target="tab-blog">
                <span class="material-symbols-outlined">article</span>
                Блог
            </button>
        </nav>

        <div class="tab-content active" data-tab-content="tab-news" id="tab-news">
            <div class="section-header">
                <div class="section-name-block">
                    <div class="section-name">
                        <h2 class="display-l section-upper">Новини</h2>
                        <button class="btn-icon" aria-label="Інформація">
                            <span class="material-symbols-outlined">info</span>
                        </button>
                    </div>
                </div>

                <div class="group">
                    <button class="btn-icon" id="btn-add-news" aria-label="Додати новину">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                </div>
            </div>

            <div id="news-table-container" class="pseudo-table-container"
                search="Пошук новин..."
                pagination
                refresh columns>
            </div>
        </div>

        <div class="tab-content" data-tab-content="tab-blog" id="tab-blog">
            <div class="section-header">
                <div class="section-name-block">
                    <div class="section-name">
                        <h2 class="display-l section-upper">Блог</h2>
                        <button class="btn-icon" aria-label="Інформація">
                            <span class="material-symbols-outlined">info</span>
                        </button>
                    </div>
                </div>

                <div class="group">
                    <button class="btn-icon" id="btn-add-blog" aria-label="Додати пост">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                </div>
            </div>

            <div id="blog-table-container" class="pseudo-table-container"
                search="Пошук статей..."
                pagination
                refresh columns>
            </div>
        </div>

        <footer class="footer"></footer>
    </main>

    <div class="aside-controls">
        <button class="btn-icon large rotate aside-trigger" aria-label="Toggle aside">
            <span class="material-symbols-outlined">apps</span>
        </button>
    </div>

    <aside class="aside closed">
        <div class="aside-body"></div>
    </aside>

    <div class="aside-fab"></div>
    <div id="modal-placeholder"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script type="module" src="js/main-blog.js"></script>
</body>

</html>
