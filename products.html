<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управління товарами</title>
    <link rel="icon" type="image/png" href="icon/dy_Dark_Pinguin.png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="js/theme-init.js"></script>
</head>

<body>
    <div class="nav column" id="main-nav"></div>

    <!-- ЦЕНТРАЛЬНИЙ БЛОК -->
    <main id="content-main" class="content-main tabbed-page" data-aside-template="aside-products">

        <!-- TAB NAVIGATOR -->
        <nav class="nav row" role="group" aria-label="Таби" data-tabs-container id="section-navigator">
            <button class="btn-icon expand active" aria-label="Товари" data-tab-target="tab-products">
                <span class="material-symbols-outlined">inventory_2</span>
                Товари
            </button>
            <button class="btn-icon expand" aria-label="Варіанти" data-tab-target="tab-variants">
                <span class="material-symbols-outlined">style</span>
                Варіанти
            </button>
            <button class="btn-icon expand" aria-label="Групування" data-tab-target="tab-groups">
                <span class="material-symbols-outlined">link</span>
                Групування
            </button>
        </nav>

        <!-- TAB: ТОВАРИ -->
        <div class="tab-content active" data-tab-content="tab-products" id="tab-products">

            <div class="section-header">
                <div class="section-name-block">
                    <div class="section-name">
                        <h2 class="display-l section-upper">Товари</h2>
                        <button class="btn-icon" aria-label="Інформація">
                            <span class="material-symbols-outlined">info</span>
                        </button>
                    </div>
                </div>

                <div class="group"></div>
            </div>

            <!-- Table Container -->
            <div id="products-table-container" class="pseudo-table-container"
                 search="Пошук товарів..."
                 pagination
                 refresh columns>
                <!-- Заповнюється JavaScript -->
            </div>
        </div>

        <!-- TAB: ВАРІАНТИ -->
        <div class="tab-content" data-tab-content="tab-variants" id="tab-variants">

            <div class="section-header">
                <div class="section-name-block">
                    <div class="section-name">
                        <h2 class="display-l section-upper">Варіанти</h2>
                        <button class="btn-icon" aria-label="Інформація">
                            <span class="material-symbols-outlined">info</span>
                        </button>
                    </div>
                </div>

                <div class="group"></div>
            </div>

            <!-- Table Container -->
            <div id="variants-table-container" class="pseudo-table-container"
                 search="Пошук варіантів..."
                 pagination
                 refresh columns>
                <!-- Заповнюється JavaScript -->
            </div>
        </div>

        <!-- TAB: ГРУПУВАННЯ -->
        <div class="tab-content" data-tab-content="tab-groups" id="tab-groups">

            <div class="section-header">
                <div class="section-name-block">
                    <div class="section-name">
                        <h2 class="display-l section-upper">Групування</h2>
                        <button class="btn-icon" aria-label="Інформація">
                            <span class="material-symbols-outlined">info</span>
                        </button>
                    </div>
                </div>

                <div class="group">
                    <button class="btn-icon" id="btn-add-group" aria-label="Додати групу">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                </div>
            </div>

            <!-- Table Container -->
            <div id="groups-table-container" class="pseudo-table-container"
                 search="Пошук груп..."
                 pagination
                 refresh columns>
                <!-- Заповнюється JavaScript -->
            </div>
        </div>

        <!-- ФІКСОВАНИЙ ФУТЕР -->
        <footer class="footer"></footer>

    </main>

    <!-- CONTROLS -->
    <div class="aside-controls">
        <button class="btn-icon large rotate aside-trigger" aria-label="Toggle aside">
            <span class="material-symbols-outlined">apps</span>
        </button>
    </div>

    <!-- ASIDE -->
    <aside class="aside closed">
        <div class="aside-body"></div>
    </aside>

    <!-- FAB -->
    <div class="aside-fab"></div>

    <div id="modal-placeholder"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script type="module" src="js/main-products.js"></script>
</body>

</html>
