<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання</title>
    <link rel="icon" type="image/png" href="icon/dy_Dark_Pinguin.png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="js/theme-init.js"></script>
</head>

<body>
    <div class="nav column" id="main-nav"></div>

    <main id="content-main" class="content-main" data-aside-template="aside-tasks">

        <div class="section-header">
            <div class="section-name-block">
                <div class="section-name">
                    <h2 class="display-l section-upper">Завдання</h2>
                    <button class="btn-icon" aria-label="Інформація">
                        <span class="material-symbols-outlined">info</span>
                    </button>
                </div>
            </div>

            <div class="group">
                <button class="btn-icon" id="btn-expand-all" aria-label="Розгорнути все">
                    <span class="material-symbols-outlined">unfold_more</span>
                </button>
                <button class="btn-icon" id="btn-collapse-all" aria-label="Згорнути все">
                    <span class="material-symbols-outlined">unfold_less</span>
                </button>
            </div>
        </div>

        <div id="tasks-cards-container" class="pseudo-table-container"
            search="Пошук завдань..."
            pagination
            refresh columns>
        </div>

        <footer class="footer"></footer>
    </main>

    <div class="aside-controls">
        <button class="btn-icon large rotate aside-trigger" aria-label="Toggle aside">
            <span class="material-symbols-outlined">apps</span>
        </button>
    </div>

    <aside class="aside">
        <div class="aside-body"></div>
    </aside>

    <div class="aside-fab"></div>
    <div id="modal-placeholder"></div>

    <script type="module" src="js/main-tasks.js"></script>
</body>

</html>
