<div class="modal-overlay modal-full" data-modal-id="brand-edit-modal">
    <div class="modal-container" refresh>

        <!-- HEADER BAR -->
        <div class="modal-header">
            <button type="button" class="btn-icon touch rotate nav-toggle" data-tooltip="Меню" data-tooltip-always aria-label="Меню">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <div class="modal-left">
                <h1 id="brand-modal-title">Новий бренд</h1>
                <span class="dot c-green" id="brand-status-badge" title="Активний"></span>
            </div>
            <div class="modal-center"></div>
            <div class="modal-right">
                <div class="switch switch-fit" id="brand-status-switch">
                    <input type="radio" id="brand-status-no" name="brand-status" value="inactive">
                    <label for="brand-status-no" class="switch-label">Неактивний</label>
                    <input type="radio" id="brand-status-yes" name="brand-status" value="active" checked>
                    <label for="brand-status-yes" class="switch-label">Активний</label>
                </div>
            </div>
            <button class="btn-icon touch c-secondary" data-modal-close data-tooltip="Закрити" data-tooltip-always>
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <!-- BODY ROW -->
        <div class="modal-body">
            <!-- НАВІГАЦІЯ -->
            <nav class="nav column" id="brand-section-navigator">
                <div class="nav-main">
                    <a href="#section-brand-info" class="btn-icon expand active" aria-label="Інформація">
                        <span class="material-symbols-outlined">info</span>
                        <span class="btn-icon-label">Інформація</span>
                    </a>
                    <a href="#section-brand-lines" class="btn-icon expand" aria-label="Лінійки">
                        <span class="material-symbols-outlined">category</span>
                        <span class="btn-icon-label">Лінійки</span>
                    </a>
                    <a href="#section-brand-links" class="btn-icon expand" aria-label="Посилання">
                        <span class="material-symbols-outlined">link</span>
                        <span class="btn-icon-label">Посилання</span>
                    </a>
                    <a href="#section-brand-marketplaces" class="btn-icon expand" aria-label="Маркетплейси">
                        <span class="material-symbols-outlined">storefront</span>
                        <span class="btn-icon-label">Маркетплейси</span>
                    </a>
                    <a href="#section-brand-text" class="btn-icon expand" aria-label="Опис">
                        <span class="material-symbols-outlined">article</span>
                        <span class="btn-icon-label">Опис</span>
                    </a>
                </div>
            </nav>
            <main>

                <!-- Hidden fields -->
                <input type="hidden" id="brand-id">
                <input type="hidden" id="brand-mapper-option-id">

                <!-- ═══════════════════════════════════════════════════════════════ -->
                <!-- СЕКЦІЯ 1: ІНФОРМАЦІЯ -->
                <!-- ═══════════════════════════════════════════════════════════════ -->
                <section id="section-brand-info">
                    <div class="section-header">
                        <div class="section-name-block">
                            <div class="section-name">
                                <h2 class="section-upper">Інформація</h2>
                            </div>
                            <span class="body-s">Основні дані про бренд</span>
                        </div>
                    </div>

                    <div class="section-content">

                        <div class="grid">
                            <div class="group column col-4">
                                <div class="group column">
                                    <label for="brand-name-uk" class="label-l">
                                        Назва бренду                                    </label>
                                    <div class="content-bloc">
                                        <div class="content-line">
                                            <div class="input-box">
                                                <input type="text" id="brand-name-uk"
                                                    placeholder="Наприклад: Optimum Nutrition" required>
                                                <span class="tag c-secondary">EN</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Альтернативні назви -->
                                <div class="group column">
                                    <label class="label-l">Альтернативні назви</label>
                                    <div id="brand-names-alt-container" class="content-bloc-container">
                                        <!-- Динамічні інпути додаються через JS -->
                                    </div>
                                </div>
                            </div>

                            <!-- Країна -->
                            <div class="group column col-4">
                                <label for="brand-country" class="label-l">Країна</label>
                                <select id="brand-country" data-custom-select>
                                    <option value="">— Оберіть країну —</option>
                                </select>
                            </div>

                            <!-- Логотип -->
                            <div class="group column col-4">
                                <label class="label-l">Логотип</label>

                                <div class="content-bloc" id="brand-logo-dropzone" data-dropzone>
                                    <div class="content-line">
                                        <div class="input-box">
                                            <input type="url" id="brand-logo-url-field"
                                                placeholder="URL або перетягніть файл...">
                                        </div>
                                        <button type="button" class="btn-icon ci-action" id="btn-pick-brand-logo"
                                            data-dz-pick data-tooltip="Вибрати файл">
                                            <span class="material-symbols-outlined">folder_open</span>
                                        </button>
                                        <button type="button" class="btn-icon ci-action u-hidden" id="btn-upload-from-url"
                                            data-dz-upload data-tooltip="Завантажити з URL">
                                            <span class="material-symbols-outlined">download</span>
                                        </button>
                                    </div>
                                    <input type="file" id="brand-logo-file-input" accept="image/*" hidden>
                                </div>

                                <input type="hidden" id="brand-logo-url">

                                <!-- Preview: інлайн прев'ю завантаженого логотипу -->
                                <div class="content-bloc u-hidden" id="brand-logo-preview">
                                    <div class="content-line">
                                        <div class="input-box">
                                            <div class="content-line-photo">
                                                <img id="brand-logo-preview-img" src="" alt="" show>
                                            </div>
                                            <div class="content-line-info">
                                                <span class="content-line-name" id="brand-logo-filename"></span>
                                                <span class="content-line-label" id="brand-logo-filesize"></span>
                                            </div>
                                            <span class="tag c-tertiary" id="brand-logo-format"></span>
                                            <button type="button" class="btn-icon ci-remove" id="btn-remove-brand-logo"
                                                data-tooltip="Видалити">
                                                <span class="material-symbols-outlined">close</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>

                    </div>
                </section>

                <!-- ═══════════════════════════════════════════════════════════════ -->
                <!-- СЕКЦІЯ 2: ЛІНІЙКИ -->
                <!-- ═══════════════════════════════════════════════════════════════ -->
                <section id="section-brand-lines">
                    <div class="section-header">
                        <div class="section-name-block">
                            <div class="section-name">
                                <h2 class="section-upper">Лінійки бренду</h2>
                            </div>
                        </div>
                        <div class="group">
                            <button class="btn-icon" id="btn-add-brand-line" aria-label="Додати лінійку">
                                <span class="material-symbols-outlined">add</span>
                            </button>
                        </div>
                    </div>

                    <div id="brand-lines-container" class="pseudo-table-container"
                         pagination refresh columns search="Пошук лінійок...">
                        <!-- Динамічний список лінійок додається через JS -->
                    </div>
                </section>

                <!-- ═══════════════════════════════════════════════════════════════ -->
                <!-- СЕКЦІЯ 3: ПОСИЛАННЯ -->
                <!-- ═══════════════════════════════════════════════════════════════ -->
                <section id="section-brand-links">
                    <div class="section-header">
                        <div class="section-name-block">
                            <div class="section-name">
                                <h2 class="section-upper">Посилання</h2>
                            </div>
                            <span class="body-s">Посилання на сайти бренду</span>
                        </div>
                        <button class="btn-outline" id="btn-add-link">
                            <span class="material-symbols-outlined">add</span>
                            <span>Додати посилання</span>
                        </button>
                    </div>

                    <div class="section-content">
                        <div id="brand-links-container" class="content-bloc-container">
                            <!-- Динамічні рядки посилань додаються через JS -->
                        </div>

                        <div id="brand-links-empty" class="u-hidden"></div>
                    </div>
                </section>

                <!-- ═══════════════════════════════════════════════════════════════ -->
                <!-- СЕКЦІЯ 4: МАРКЕТПЛЕЙСИ -->
                <!-- ═══════════════════════════════════════════════════════════════ -->
                <section id="section-brand-marketplaces">
                    <div class="section-header">
                        <div class="section-name-block">
                            <div class="section-name">
                                <h2 class="section-upper">Маркетплейси</h2>
                            </div>
                            <span class="body-s">Присутність бренду на маркетплейсах</span>
                        </div>
                    </div>

                    <div class="section-content">
                        <div id="brand-marketplaces-container">
                            <!-- Заповнюється динамічно через JS -->
                        </div>
                    </div>
                </section>

                <!-- ═══════════════════════════════════════════════════════════════ -->
                <!-- СЕКЦІЯ 5: ОПИС -->
                <!-- ═══════════════════════════════════════════════════════════════ -->
                <section id="section-brand-text">
                    <div class="section-header">
                        <div class="section-name-block">
                            <div class="section-name">
                                <h2 class="section-upper">Опис</h2>
                            </div>
                            <span class="body-s">Опис бренду для сайту</span>
                        </div>
                    </div>

                    <div id="brand-text-editor-container" class="section-content-full-height"
                         editor tools code stats cleanup-links="allow"
                         data-placeholder="Введіть опис бренду..."
                         data-min-height="300">
                        <!-- UI Editor буде вставлений через JS -->
                    </div>
                </section>

            </main>

            <!-- ASIDE -->
            <div class="modal-aside">
                <div class="modal-top"></div>
                <div class="modal-btm">
                    <button class="btn-icon" id="btn-save-brand" data-tooltip="Зберегти" data-tooltip-always aria-label="Зберегти">
                        <span class="material-symbols-outlined">save</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- FOOTER BAR -->
        <div class="modal-footer">
            <button type="button" class="btn-icon touch danger u-hidden" id="btn-delete-brand" data-tooltip="Видалити" data-tooltip-always aria-label="Видалити">
                <span class="material-symbols-outlined">delete</span>
            </button>
            <div class="modal-left"></div>
            <div class="modal-center"></div>
            <div class="modal-right"></div>
            <button class="btn-icon touch c-main" id="save-close-brand" data-tooltip="Зберегти і закрити" data-tooltip-always aria-label="Зберегти і закрити">
                <span class="material-symbols-outlined">check</span>
            </button>
        </div>

    </div>
</div>
