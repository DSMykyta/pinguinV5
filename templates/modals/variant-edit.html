<div class="modal-overlay modal-fullscreen" data-modal-id="variant-edit-modal">
    <div class="modal-fullscreen-container modal-with-sidebar" refresh>

        <!-- HEADER -->
        <header class="modal-fullscreen-header">
            <div class="modal-fullscreen-header-left">
                <button class="btn-icon touch" data-modal-close title="Закрити">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <div class="modal-fullscreen-title">
                    <h1 id="variant-modal-title">Новий варіант</h1>
                    <span class="tag c-yellow" id="variant-status-badge"></span>
                </div>
            </div>
            <div class="group">
                <div class="switch switch-fit" id="variant-status-switch">
                    <input type="radio" id="variant-status-inactive" name="variant-status" value="inactive">
                    <label for="variant-status-inactive" class="switch-label">Неактивний</label>
                    <input type="radio" id="variant-status-active" name="variant-status" value="active" checked>
                    <label for="variant-status-active" class="switch-label">Активний</label>
                </div>
                <button class="btn-icon" id="btn-save-variant" title="Зберегти">
                    <span class="material-symbols-outlined">save</span>
                </button>
                <button class="btn-icon touch c-main" id="save-close-variant" title="Зберегти і закрити">
                    <span class="material-symbols-outlined">check</span>
                </button>
            </div>
        </header>

        <!-- ОСНОВНИЙ КОНТЕНТ З САЙДБАРОМ -->
        <div class="modal-body-with-sidebar">

            <!-- ВЕРТИКАЛЬНА НАВІГАЦІЯ ЗЛІВА -->
            <nav class="nav column" id="variant-section-navigator">
                <button type="button" class="btn-icon touch nav-toggle" data-tooltip="Розгорнути меню" data-tooltip-always aria-label="Розгорнути меню">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <div class="nav-main">
                    <a href="#section-variant-info" class="btn-icon expand touch active" aria-label="Основне">
                        <span class="material-symbols-outlined">info</span>
                        <span class="btn-icon-label">Основне</span>
                    </a>
                    <a href="#section-variant-photos" class="btn-icon expand touch" aria-label="Фото">
                        <span class="material-symbols-outlined">photo_library</span>
                        <span class="btn-icon-label">Фото</span>
                    </a>
                    <a href="#section-variant-composition-code" class="btn-icon expand touch" aria-label="Код складу">
                        <span class="material-symbols-outlined">code</span>
                        <span class="btn-icon-label">Код складу</span>
                    </a>
                    <a href="#section-variant-composition-notes" class="btn-icon expand touch" aria-label="1 порція">
                        <span class="material-symbols-outlined">notes</span>
                        <span class="btn-icon-label">1 порція</span>
                    </a>
                </div>

                <div class="nav-footer">
                    <button type="button" class="btn-icon touch danger u-hidden" id="btn-delete-variant" aria-label="Видалити">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                </div>
            </nav>

            <!-- КОНТЕНТ - секції -->
            <main class="modal-fullscreen-content">

                <!-- Hidden fields -->
                <input type="hidden" id="variant-id">
                <input type="hidden" id="variant-product-id">

                <!-- ═══════════════════════════════════════════════════════════════ -->
                <!-- СЕКЦІЯ: ОСНОВНЕ -->
                <!-- ═══════════════════════════════════════════════════════════════ -->
                <section id="section-variant-info">
                    <div class="section-header">
                        <div class="section-name-block">
                            <div class="section-name">
                                <h2 class="section-upper">Основне</h2>
                            </div>
                            <span class="body-s">Основна інформація про варіант</span>
                        </div>
                    </div>

                    <div class="section-content">
                        <div class="grid">
                            <!-- Назва варіанту -->
                            <div class="group column col-6">
                                <label class="label-l">Назва варіанту</label>
                                <div class="content-bloc-container">
                                    <div class="content-bloc">
                                        <div class="content-line">
                                            <div class="input-box">
                                                <input type="text" id="variant-name-ua"
                                                    placeholder="Назва українською" required>
                                                <span class="tag c-secondary">UA</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="content-bloc">
                                        <div class="content-line">
                                            <div class="input-box">
                                                <input type="text" id="variant-name-ru"
                                                    placeholder="Назва російською">
                                                <span class="tag c-secondary">RU</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- SKU -->
                            <div class="group column col-3">
                                <label class="label-l" for="variant-sku">SKU</label>
                                <div class="content-bloc">
                                    <div class="content-line">
                                        <div class="input-box">
                                            <input type="text" id="variant-sku"
                                                placeholder="Артикул">
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Штрихкод -->
                            <div class="group column col-3">
                                <label class="label-l" for="variant-barcode">Штрихкод</label>
                                <div class="content-bloc">
                                    <div class="content-line">
                                        <div class="input-box">
                                            <input type="text" id="variant-barcode"
                                                placeholder="EAN / UPC">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="grid">
                            <!-- Ціна -->
                            <div class="group column col-3">
                                <label class="label-l" for="variant-price">Ціна</label>
                                <div class="content-bloc">
                                    <div class="content-line">
                                        <div class="input-box">
                                            <input type="number" step="0.01" id="variant-price"
                                                placeholder="0.00">
                                            <span class="tag c-tertiary">грн</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Вага -->
                            <div class="group column col-3">
                                <label class="label-l" for="variant-weight">Вага</label>
                                <div class="content-bloc">
                                    <div class="content-line">
                                        <div class="input-box">
                                            <input type="text" id="variant-weight"
                                                placeholder="Наприклад: 2.27 кг">
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Залишок -->
                            <div class="group column col-3">
                                <label class="label-l" for="variant-stock">Залишок</label>
                                <div class="content-bloc">
                                    <div class="content-line">
                                        <div class="input-box">
                                            <input type="number" step="1" id="variant-stock"
                                                placeholder="0">
                                            <span class="tag c-tertiary">шт</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Динамічні характеристики (блок 8) -->
                        <div id="variant-characteristics-container"></div>
                    </div>
                </section>

                <!-- ═══════════════════════════════════════════════════════════════ -->
                <!-- СЕКЦІЯ: ФОТО -->
                <!-- ═══════════════════════════════════════════════════════════════ -->
                <section id="section-variant-photos">
                    <div class="section-header">
                        <div class="section-name-block">
                            <div class="section-name">
                                <h2 class="section-upper">Фото</h2>
                            </div>
                            <span class="body-s">Зображення варіанту</span>
                        </div>
                    </div>

                    <div class="section-content">
                        <div class="grid">
                            <div class="group column col-12">
                                <label class="label-l" for="variant-image-url-field">URL зображення</label>
                                <div class="content-bloc">
                                    <div class="content-line">
                                        <div class="input-box">
                                            <input type="url" id="variant-image-url-field"
                                                placeholder="URL зображення">
                                        </div>
                                    </div>
                                </div>
                                <input type="hidden" id="variant-image-url">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- ═══════════════════════════════════════════════════════════════ -->
                <!-- СЕКЦІЯ: КОД СКЛАДУ -->
                <!-- ═══════════════════════════════════════════════════════════════ -->
                <section id="section-variant-composition-code">
                    <div class="section-header">
                        <div class="section-name-block">
                            <div class="section-name">
                                <h2 class="section-upper">Код складу</h2>
                            </div>
                            <span class="body-s">Код складу варіанту</span>
                        </div>
                    </div>

                    <div class="section-content section-content-full-height">
                        <div class="grid editor-focus-split">
                            <div class="group column col-6">
                                <div id="variant-composition-code-ua-editor" class="section-content-full-height"
                                     editor tools code
                                     data-placeholder="Код складу українською..."
                                     data-min-height="200"
                                     data-tag="UA">
                                </div>
                            </div>
                            <div class="group column col-6">
                                <div id="variant-composition-code-ru-editor" class="section-content-full-height"
                                     editor tools code
                                     data-placeholder="Код складу російською..."
                                     data-min-height="200"
                                     data-tag="RU">
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- ═══════════════════════════════════════════════════════════════ -->
                <!-- СЕКЦІЯ: 1 ПОРЦІЯ -->
                <!-- ═══════════════════════════════════════════════════════════════ -->
                <section id="section-variant-composition-notes">
                    <div class="section-header">
                        <div class="section-name-block">
                            <div class="section-name">
                                <h2 class="section-upper">1 порція</h2>
                            </div>
                            <span class="body-s">Склад на 1 порцію</span>
                        </div>
                    </div>

                    <div class="section-content section-content-full-height">
                        <div class="grid editor-focus-split">
                            <div class="group column col-6">
                                <div id="variant-composition-notes-ua-editor" class="section-content-full-height"
                                     editor tools code br
                                     data-placeholder="1 порція українською..."
                                     data-min-height="200"
                                     data-tag="UA">
                                </div>
                            </div>
                            <div class="group column col-6">
                                <div id="variant-composition-notes-ru-editor" class="section-content-full-height"
                                     editor tools code br
                                     data-placeholder="1 порція російською..."
                                     data-min-height="200"
                                     data-tag="RU">
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

            </main>

        </div>

    </div>
</div>
