<div class="modal-overlay" data-modal-id="group-edit">
    <div class="modal-container">
        <!-- Header -->
        <div class="modal-header">
            <h2><span id="group-modal-title">Нова група</span></h2>
            <div class="group">
                <button id="btn-save-group" class="btn-icon" aria-label="Зберегти">
                    <span class="material-symbols-outlined">save</span>
                </button>
                <button class="btn-icon touch" aria-label="Закрити" data-modal-close>
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
        </div>

        <!-- Body -->
        <div class="modal-body">

            <!-- Пошук і додавання товару -->
            <div class="group column col-12">
                <label class="label-l">Додати товар</label>
                <div class="content-bloc">
                    <div class="content-line">
                        <div class="input-box">
                            <input type="text" id="group-product-search" placeholder="Пошук за назвою або ID...">
                        </div>
                        <button type="button" class="btn-icon ci-action" id="btn-add-product-to-group" data-tooltip="Додати по ID" data-tooltip-always>
                            <span class="material-symbols-outlined">add</span>
                        </button>
                    </div>
                </div>

                <!-- Підказки пошуку -->
                <div class="content-bloc-container" id="group-product-suggestions">
                    <!-- Динамічно: результати пошуку -->
                </div>
            </div>

            <!-- Список товарів групи -->
            <div class="group column col-12">
                <label class="label-l">Товари в групі</label>
                <div class="content-bloc-container" id="group-products-list">
                    <!-- Динамічно: картки товарів -->
                </div>
            </div>

        </div>

        <!-- Footer -->
        <div class="modal-footer"></div>
    </div>
</div>
