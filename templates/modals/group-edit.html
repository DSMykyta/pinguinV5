<div class="modal-overlay" data-modal-id="group-edit">
    <div class="modal-container">
        <!-- Header -->
        <div class="modal-header">
            <h2><span id="group-modal-title">Нова група</span></h2>
            <div class="group">
                <div class="switch switch-fit" id="group-type-switch">
                    <input type="radio" id="group-type-label" name="group-type" value="label" checked>
                    <label for="group-type-label" class="switch-label">Ознака</label>
                    <input type="radio" id="group-type-detail" name="group-type" value="detail">
                    <label for="group-type-detail" class="switch-label">Деталь</label>
                    <input type="radio" id="group-type-variant" name="group-type" value="variant">
                    <label for="group-type-variant" class="switch-label">Варіант</label>
                </div>
                <button id="btn-save-group" class="btn-icon" aria-label="Зберегти">
                    <span class="material-symbols-outlined">save</span>
                </button>
                <button class="btn-icon touch" aria-label="Закрити" data-modal-close>
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
        </div>

        <!-- Body -->
        <div class="modal-body">

            <!-- Вибір товару через custom select -->
            <div class="group column col-12">
                <label for="group-product-select" class="label-l">Додати товар</label>
                <select id="group-product-select" data-custom-select>
                    <option value="">— Оберіть товар —</option>
                </select>
            </div>

            <!-- Список товарів групи (draggable) -->
            <div class="group column col-12">
                <label class="label-l">Товари в групі</label>
                <div class="content-bloc-container" id="group-products-list">
                    <!-- Динамічно: картки товарів з drag -->
                </div>
            </div>

        </div>

        <!-- Footer -->
        <div class="modal-footer"></div>
    </div>
</div>
