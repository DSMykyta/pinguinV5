<div class="modal-overlay">
    <div class="modal-container modal-medium">
        <!-- Header -->
        <div class="modal-header">
            <h2>Новий товар</h2>
            <div class="group">
                <span id="wizard-step-label" class="body-s"></span>
                <button class="btn-icon touch modal-close-btn" aria-label="Закрити" data-modal-close>
                    <div class="state-layer">
                        <span class="material-symbols-outlined">close</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- Body -->
        <div class="modal-body" id="product-wizard-body">
            <!-- Крок 1: Бренд + Лінійка + Категорія -->
            <div class="wizard-step" id="wizard-step-1">
                <div class="grid">
                    <div class="group column col-4">
                        <label class="label-l" for="wizard-brand">Бренд</label>
                        <select id="wizard-brand" data-custom-select required>
                            <option value="">— Оберіть бренд —</option>
                        </select>
                    </div>

                    <div class="group column col-4">
                        <label class="label-l" for="wizard-line">Лінійка</label>
                        <select id="wizard-line" data-custom-select>
                            <option value="">— Оберіть лінійку —</option>
                        </select>
                    </div>

                    <div class="group column col-4">
                        <label class="label-l" for="wizard-category">Категорія</label>
                        <select id="wizard-category" data-custom-select required>
                            <option value="">— Оберіть категорію —</option>
                        </select>
                        <label class="label-s">Визначає набір характеристик товару</label>
                    </div>
                </div>
            </div>

            <!-- Крок 2: Назва + Фото -->
            <div class="wizard-step u-hidden" id="wizard-step-2">
                <div class="grid">
                    <div class="group column col-6">
                        <label class="label-l">Назва товару</label>
                        <div class="content-bloc-container">
                            <div class="content-bloc">
                                <div class="content-line">
                                    <div class="input-box">
                                        <input type="text" id="wizard-name-ua"
                                            placeholder="Назва українською" required>
                                        <span class="tag c-main">UA</span>
                                    </div>
                                </div>
                            </div>
                            <div class="content-bloc">
                                <div class="content-line">
                                    <div class="input-box">
                                        <input type="text" id="wizard-name-ru"
                                            placeholder="Назва російською">
                                        <span class="tag c-secondary">RU</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="group column col-6">
                        <label class="label-l">Головне фото</label>
                        <div class="content-bloc" id="wizard-photo-dropzone">
                            <div class="content-line">
                                <div class="input-box">
                                    <input type="url" id="wizard-photo-url"
                                        placeholder="URL або перетягніть зображення...">
                                </div>
                                <button type="button" class="btn-icon ci-action" id="btn-wizard-photo-upload"
                                    data-tooltip="Завантажити">
                                    <span class="material-symbols-outlined">upload</span>
                                </button>
                            </div>
                            <input type="file" id="wizard-photo-file" accept="image/*" hidden>
                        </div>

                        <div class="content-bloc u-hidden" id="wizard-photo-preview">
                            <div class="content-line">
                                <div class="content-line-photo">
                                    <img id="wizard-photo-preview-img" src="" alt="" show>
                                </div>
                                <div class="content-line-info">
                                    <span class="content-line-name" id="wizard-photo-filename"></span>
                                </div>
                                <button type="button" class="btn-icon ci-remove" id="btn-wizard-photo-remove"
                                    data-tooltip="Видалити">
                                    <span class="material-symbols-outlined">close</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Крок 3: Перший варіант -->
            <div class="wizard-step u-hidden" id="wizard-step-3">
                <div class="grid">
                    <div class="group column col-4">
                        <label class="label-l" for="wizard-variant-name">Назва варіанту</label>
                        <div class="content-bloc">
                            <div class="content-line">
                                <div class="input-box">
                                    <input type="text" id="wizard-variant-name"
                                        placeholder="Наприклад: 2.27 кг / Шоколад">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="group column col-4">
                        <label class="label-l" for="wizard-variant-sku">SKU</label>
                        <div class="content-bloc">
                            <div class="content-line">
                                <div class="input-box">
                                    <input type="text" id="wizard-variant-sku"
                                        placeholder="Артикул">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="group column col-4">
                        <label class="label-l" for="wizard-variant-price">Ціна</label>
                        <div class="content-bloc">
                            <div class="content-line">
                                <div class="input-box">
                                    <input type="number" step="0.01" id="wizard-variant-price"
                                        placeholder="0.00">
                                    <span class="tag c-tertiary">грн</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Крок 4: Підсумок -->
            <div class="wizard-step u-hidden" id="wizard-step-4">
                <div id="wizard-summary"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="modal-footer wizard-buttons">
            <button class="btn-ghost" id="wizard-btn-prev">
                <span class="material-symbols-outlined">arrow_back</span>
                Назад
            </button>
            <div class="group">
                <button class="btn-ghost" id="wizard-btn-skip">Пропустити</button>
                <button class="btn-primary" id="wizard-btn-next">
                    Далі
                    <span class="material-symbols-outlined">arrow_forward</span>
                </button>
                <button class="btn-primary u-hidden" id="wizard-btn-create">
                    <span class="material-symbols-outlined">check</span>
                    Створити
                </button>
            </div>
        </div>
    </div>
</div>
