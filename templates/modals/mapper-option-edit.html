<div class="modal-overlay modal-full" data-modal-id="mapper-option-edit">
    <div class="modal-container" refresh>

        <!-- HEADER BAR -->
        <div class="modal-header">
            <button type="button" class="btn-icon touch nav-toggle" data-tooltip="Меню" data-tooltip-always aria-label="Меню">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <div class="modal-left">
                <h1 id="option-modal-title">Опція</h1>
            </div>
            <div class="modal-center"></div>
            <div class="modal-right"></div>
            <button class="btn-icon touch c-secondary" data-modal-close data-tooltip="Закрити" data-tooltip-always title="Закрити">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <!-- BODY ROW -->
        <div class="modal-body">
            <!-- SIDEBAR NAVIGATOR -->
            <nav class="nav column" id="option-section-navigator">
                <div class="nav-main">
                    <a href="#section-option-main" class="btn-icon expand active" aria-label="Основні дані">
                        <span class="material-symbols-outlined">edit</span>
                        <span class="btn-icon-label">Основні дані</span>
                    </a>
                    <a href="#section-option-dependent" class="btn-icon expand u-hidden" id="nav-option-dependent"
                        aria-label="Дочірні опції">
                        <span class="material-symbols-outlined">account_tree</span>
                        <span class="btn-icon-label">Дочірні опції</span>
                    </a>
                    <!-- Секції маркетплейсів додаються динамічно через JS -->
                </div>
            </nav>
            <main>

                <!-- СЕКЦІЯ: ОСНОВНІ ДАНІ -->
                <section id="section-option-main">
                    <div class="section-header">
                        <div class="section-name-block">
                            <div class="section-name">
                                <h2 class="section-upper">Основні дані</h2>
                                <button class="btn-icon" aria-label="Інформація">
                                    <span class="material-symbols-outlined">info</span>
                                </button>
                            </div>
                            <span class="body-s">Налаштування власної опції</span>
                        </div>
                    </div>

                    <div class="section-content">
                        <!-- Прив'язки -->
                        <div class="grid">
                            <div class="group column col-6">
                                <label class="label-l" for="mapper-option-char">
                                    Характеристика                                </label>
                                <select id="mapper-option-char" data-custom-select placeholder="Оберіть характеристику"
                                    required>
                                    <option value="">-- Оберіть характеристику --</option>
                                </select>
                                <label class="label-s">Оберіть характеристику, до якої належить опція</label>
                            </div>

                            <div class="group column col-6">
                                <label class="label-l" for="mapper-option-parent">Батьківська опція</label>
                                <select id="mapper-option-parent" data-custom-select
                                    data-placeholder="Без батьківської опції">
                                    <option value="">— Без батьківської опції —</option>
                                </select>
                                <label class="label-s">При виборі батьківської опції з'явиться дропдаун з цією опцією</label>
                            </div>
                        </div>



                        <!-- Значення -->
                        <div class="grid">
                            <div class="group column col-6">
                                <label class="label-l" for="mapper-option-value-ua">
                                    Значення                                </label>
                                <div class="content-bloc-container">
                                    <div class="content-bloc">
                                        <div class="content-line">
                                            <div class="input-box">
                                                <input type="text" id="mapper-option-value-ua"
                                                    placeholder="Значення українською" required>
                                                <span class="tag c-secondary">UA</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="content-bloc">
                                        <div class="content-line">
                                            <div class="input-box">
                                                <input type="text" id="mapper-option-value-ru"
                                                    placeholder="Значення російською">
                                                <span class="tag c-secondary">RU</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid">
                        <div class="group column col-6">
                            <label class="label-l" for="mapper-option-order">Порядок сортування</label>
                            <input type="number" id="mapper-option-order" class="input-main" placeholder="0" value="0"
                                min="0">
                            <label class="label-s">Менше число = вища позиція в списку</label>
                        </div>
                    </div>

                </section>

                <!-- СЕКЦІЯ: ЗАЛЕЖНІ ХАРАКТЕРИСТИКИ -->
                <section id="section-option-dependent" class="u-hidden">
                    <div class="section-header">
                        <div class="section-name-block">
                            <div class="section-name">
                                <h2 class="section-upper">Дочірні опції</h2>
                            </div>
                        </div>
                        <div class="group"></div>
                    </div>

                    <div id="option-related-chars" class="pseudo-table-container"
                         pagination refresh columns search="Пошук опцій...">
                        <!-- Заповнюється динамічно -->
                    </div>
                    <div class="footer"></div>
                </section>

                <!-- СЕКЦІЇ МАРКЕТПЛЕЙСІВ додаються динамічно через JS -->

            </main>

            <!-- ASIDE -->
            <div class="modal-aside">
                <div class="modal-top"></div>
                <div class="modal-btm">
                    <button class="btn-icon" id="save-mapper-option" data-tooltip="Зберегти" data-tooltip-always aria-label="Зберегти">
                        <span class="material-symbols-outlined">save</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- FOOTER BAR -->
        <div class="modal-footer">
            <button type="button" class="btn-icon touch danger u-hidden" id="delete-mapper-option" data-tooltip="Видалити" data-tooltip-always aria-label="Видалити">
                <span class="material-symbols-outlined">delete</span>
            </button>
            <div class="modal-left"></div>
            <div class="modal-center"></div>
            <div class="modal-right"></div>
            <button class="btn-icon touch c-main" id="save-close-mapper-option" data-tooltip="Зберегти і закрити" data-tooltip-always aria-label="Зберегти і закрити">
                <span class="material-symbols-outlined">check</span>
            </button>
        </div>

    </div>
</div>
