<!-- templates/modals/auth-login-modal.html -->

<div class="modal-overlay">
    <div class="modal-container modal-small">
        <!-- Header -->
        <div class="modal-header">
            <h2>Вхід</h2>
        </div>

        <!-- Body -->
        <div class="modal-body">
            <div class="modal-confirm-body">
                <!-- Avatar (filled by JS) -->
                <div id="auth-login-avatar-container"></div>

                <div class="speech-bubble body-s" id="auth-login-avatar-message"></div>
            </div>

            <div class="group column">
                <label class="label-l" for="auth-username">Логін</label>
                <input type="text" id="auth-username" class="input-main" placeholder="Введіть логін"
                    autocomplete="username" required autofocus>
            </div>

            <div class="group column">
                <label class="label-l" for="auth-password">Пароль</label>
                <input type="password" id="auth-password" class="input-main" placeholder="Введіть пароль"
                    autocomplete="current-password" required>
            </div>
        </div>

        <!-- Footer -->
        <div class="modal-footer">
            <button class="btn-ghost" data-modal-close>Скасувати</button>
            <button class="btn-primary" id="auth-login-btn">Увійти</button>
        </div>
    </div>
</div>
