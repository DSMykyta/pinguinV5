<div class="panel-content-fix">

    <div id="result-card-html" class="content-line panel">
        <span class="material-symbols-outlined">code</span>
        <span class="panel-text result-status">Склад</span>
    </div>

    <div id="result-card-br" class="content-line panel">
        <span class="material-symbols-outlined">notes</span>
        <span class="panel-text result-status">1 порція</span>
    </div>

    <div id="result-card-insert" class="content-line panel u-hidden">
        <span class="material-symbols-outlined">post_add</span>
        <span class="panel-text result-status">Додати</span>
    </div>

</div>

<div class="panel-content-scroll">

    <details class="panel-group" open>
        <summary class="panel-group-summary label-l">
            <span>Рядки</span>
            <span class="material-symbols-outlined panel-group-chevron" aria-hidden="true">chevron_right</span>
        </summary>

        <div class="panel-group-content">
            <button id="add-input-btn" class="btn-option" aria-label="Додати новий рядок">
                <span class="material-symbols-outlined">add</span>
                <span>Новий рядок</span>
            </button>

            <button id="add-empty-line-btn" class="btn-option" aria-label="Додати розділювач">
                <span class="material-symbols-outlined">rectangle</span>
                <span>Розділювач</span>
            </button>

            <button id="add-ingredients-btn" class="btn-option" aria-label="Додати блок інгредієнтів">
                <span class="material-symbols-outlined">science</span>
                <span>Інгредієнти</span>
            </button>
        </div>
    </details>

    <details class="panel-group" open>
        <summary class="panel-group-summary label-l">
            <span>Заповнення</span>
            <span class="material-symbols-outlined panel-group-chevron" aria-hidden="true">chevron_right</span>
        </summary>

        <div class="panel-group-content">
            <div class="group wrap">
                <button id="add-warning-btn" class="btn-icon square" data-tooltip="Додати попередження" data-tooltip-always aria-label="Додати попередження">
                    <span class="material-symbols-outlined">warning</span>
                </button>

                <button id="add-composition-btn" class="btn-icon square" data-tooltip="Додати різний склад" data-tooltip-always aria-label="Додати різний склад">
                    <span class="material-symbols-outlined">call_split</span>
                </button>

                <button id="add-nutrition-btn" class="btn-icon square" data-tooltip="Додати харчову цінність" data-tooltip-always aria-label="Додати харчову цінність">
                    <span class="material-symbols-outlined">nutrition</span>
                </button>

                <button id="add-vitamins-btn" class="btn-icon square" data-tooltip="Додати вітаміни" data-tooltip-always aria-label="Додати вітаміни">
                    <span class="material-symbols-outlined">local_pharmacy</span>
                </button>

                <button id="add-aminos-btn" class="btn-icon square" data-tooltip="Додати амінокислоти" data-tooltip-always aria-label="Додати амінокислоти">
                    <span class="material-symbols-outlined">pill</span>
                </button>
            </div>
        </div>
    </details>

</div>

<div class="panel-content-footer">

    <button id="magic-btn" class="fab primary" data-modal-trigger="magic-modal" data-tooltip="Магія" data-tooltip-always>
        <span class="material-symbols-outlined">auto_fix_high</span>
    </button>
</div>
